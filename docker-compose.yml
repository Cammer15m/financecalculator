services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financecalc}
      POSTGRES_USER: ${POSTGRES_USER:-financecalc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/00-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financecalc} -d ${POSTGRES_DB:-financecalc}"]
      interval: 5s
      timeout: 3s
      retries: 20

  app:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-financecalc}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-financecalc}
      SESSION_PASSWORD: ${SESSION_PASSWORD:?set SESSION_PASSWORD (>=32 chars) in .env}
      BOOTSTRAP_ADMIN_EMAIL: ${BOOTSTRAP_ADMIN_EMAIL:-}
      BOOTSTRAP_ADMIN_PASSWORD: ${BOOTSTRAP_ADMIN_PASSWORD:-}
      NODE_ENV: production
    ports:
      - "${APP_PORT:-3000}:3000"

volumes:
  pgdata:
